<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #drawer mode="over" class="sidenav" fixedInViewport="true" fixedTopGap="64">
    <div class="sidenav-header">
      <mat-icon class="sidenav-logo">storefront</mat-icon>
      <span class="sidenav-brand">ShopHub</span>
    </div>
    <mat-divider></mat-divider>
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" *ngIf="auth.isAdmin" routerLinkActive="active-nav" (click)="drawer.close()">
        <mat-icon>dashboard</mat-icon><span>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/products" routerLinkActive="active-nav" (click)="drawer.close()">
        <mat-icon>store</mat-icon><span>Products</span>
      </a>
      <a mat-list-item routerLink="/orders" *ngIf="auth.isLoggedIn" routerLinkActive="active-nav" (click)="drawer.close()">
        <mat-icon>receipt_long</mat-icon><span>Orders</span>
      </a>
      <a mat-list-item routerLink="/cart" *ngIf="auth.isLoggedIn" routerLinkActive="active-nav" (click)="drawer.close()">
        <mat-icon>shopping_cart</mat-icon><span>Cart</span>
      </a>
      <a mat-list-item routerLink="/notifications" *ngIf="auth.isLoggedIn" routerLinkActive="active-nav" (click)="drawer.close()">
        <mat-icon>notifications</mat-icon><span>Notifications</span>
      </a>
      <mat-divider *ngIf="auth.isAdmin"></mat-divider>
      <a mat-list-item routerLink="/categories" *ngIf="auth.isAdmin" routerLinkActive="active-nav" (click)="drawer.close()">
        <mat-icon>category</mat-icon><span>Manage Categories</span>
      </a>
      <a mat-list-item routerLink="/products/new" *ngIf="auth.isAdmin" routerLinkActive="active-nav" (click)="drawer.close()">
        <mat-icon>add_circle</mat-icon><span>Add Product</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <app-navbar (menuToggle)="drawer.toggle()" (themeToggle)="toggleTheme()" [isDark]="isDark"></app-navbar>
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
    <div class="global-loading" *ngIf="loadingService.loading$ | async" aria-live="polite" role="status">
      <mat-spinner diameter="48"></mat-spinner>
    </div>
    <app-notification-toast></app-notification-toast>
  </mat-sidenav-content>
</mat-sidenav-container>
